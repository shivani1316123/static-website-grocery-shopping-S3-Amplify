<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMart - Fresh Grocery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f8f9fa;
}

/* Header */
header {
    background: linear-gradient(45deg, #28a745, #20c997);
    color: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    font-size: 24px;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: 500;
}

/* Hero Section */
.hero {
    height: 60vh;
    background: url('https://images.unsplash.com/photo-1542838132-92c53300491e') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}

.hero h2 {
    font-size: 40px;
    background: rgba(0,0,0,0.5);
    padding: 20px;
    border-radius: 10px;
}

/* Products */
.container {
    padding: 40px;
}

.container h2 {
    text-align: center;
    margin-bottom: 30px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
}

.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card:hover {
    transform: translateY(-10px);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card-body {
    padding: 15px;
    text-align: center;
}

.card-body h3 {
    margin-bottom: 10px;
}

.price {
    color: #28a745;
    font-weight: bold;
    margin-bottom: 10px;
}

.btn {
    background: #28a745;
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #218838;
}

/* Footer */
footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: 40px;
}
</style>
</head>

<body>

<header>
    <h1>🛒 GreenMart</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">Offers</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Fresh Groceries Delivered to Your Doorstep 🌿</h2>
</section>

<section class="container">
    <h2>Popular Products</h2>
    <div class="products">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce">
            <div class="card-body">
                <h3>Apples</h3>
                <p class="price">₹120/kg</p>
                <button class="btn">Add to Cart</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">
            <div class="card-body">
                <h3>Milk</h3>
                <p class="price">₹60/L</p>
                <button class="btn">Add to Cart</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1603046891744-1f76eb10aec7">
            <div class="card-body">
                <h3>Rice</h3>
                <p class="price">₹90/kg</p>
                <button class="btn">Add to Cart</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1615486362192-7e7c1f7b91f6">
            <div class="card-body">
                <h3>Vegetables</h3>
                <p class="price">₹40/kg</p>
                <button class="btn">Add to Cart</button>
            </div>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 GreenMart | Fresh & Organic 🌱</p>
</footer>

</body>
</html>
